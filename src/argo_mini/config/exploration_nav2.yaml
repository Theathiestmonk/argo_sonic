# exploration_nav2.yaml – Override params loaded ON TOP of nav2.yaml during frontier exploration.
#
# Load order in shell script:
#   --params-file nav2.yaml --params-file exploration_nav2.yaml
#
# Overrides:
#   bt_navigator   – points to exploration BT (no Spin/BackUp; Wait-only recovery)
#   planner_server – NavFn with allow_unknown:true (routes into unexplored space)
#   controller_server – relaxed PathAngleCritic so robot doesn't tank-spin at frontiers
#   behavior_server – only Wait plugin (no physical motion = no SLAM distortion)
#   global_costmap  – added (missing from nav2.yaml); track_unknown_space:true
#   local_costmap   – tighter inflation_radius so doorways stay navigable

bt_navigator:
  ros__parameters:
    default_nav_to_pose_bt_xml: "/home/argo/argo_sonic/src/argo_mini/config/bt/explore_navigate_to_pose.xml"
    default_nav_through_poses_bt_xml: "/home/argo/argo_sonic/src/argo_mini/config/bt/explore_navigate_to_pose.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_recovery_node_bt_node
      - nav2_rate_controller_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: ["NavFn"]
    NavFn:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

controller_server:
  ros__parameters:
    FollowPath:
      PathAngleCritic:
        cost_weight: 2.0
        max_angle_to_furthest: 1.57

behavior_server:
  ros__parameters:
    behavior_plugins: ["wait"]
    wait:
      plugin: "nav2_behaviors/Wait"

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      footprint: "[[0.265, 0.225], [0.265, -0.225], [-0.265, -0.225], [-0.265, 0.225]]"
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.22

local_costmap:
  local_costmap:
    ros__parameters:
      inflation_layer:
        inflation_radius: 0.22
