slam_toolbox:
  ros__parameters:
    odom_frame:   odom
    map_frame:    map
    base_frame:   base_link
    scan_topic:   /scan_corrected   # timestamp-corrected scan from scan_relay
    mode:         mapping
    use_sim_time: false

    # 5 cm resolution — matches Nav2 costmap resolution
    resolution:              0.05
    # A1 reliable indoor range — avoids glass/mirror artefacts
    max_laser_range:          6.0
    minimum_laser_range:      0.20

    # Dense pose graph: node every 10 cm or ~2° turn
    minimum_travel_distance: 0.10
    minimum_travel_heading:  0.035
    map_update_interval:     0.5

    use_scan_matching:       true
    use_scan_barycenter:     true

    # Larger buffer so fast turns don't starve the correlator
    scan_buffer_size:                   30
    scan_buffer_maximum_scan_distance:  6.0

    # Loop closure: catches cumulative drift when revisiting rooms
    do_loop_closing:                    true
    loop_search_maximum_distance:       5.0
    loop_match_minimum_chain_size:      5
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine:   0.50

    # Penalise heading drift more — main error source on diff-drive
    distance_variance_penalty: 0.5
    angle_variance_penalty:    1.0

    # Allow RViz SLAM Toolbox plugin (serialize / load buttons)
    enable_interactive_mode: true
